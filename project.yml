name: PokerGame
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
settings:
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  SWIFT_VERSION: "5.9"
targets:
  PokerGame:
    type: application
    platform: iOS
    sources:
      - path: PokerGame
    resources:
      - path: PokerGame/Assets.xcassets
    info:
      path: PokerGame/Info.plist
      properties:
        CFBundleDisplayName: 无厘头德州扑克
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.PokerGame
      PRODUCT_NAME: PokerGame
      TARGETED_DEVICE_FAMILY: "1,2"
      ENABLE_PREVIEWS: "YES"
